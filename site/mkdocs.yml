site_name: dspy4s
site_description: "A Scala 3 library for building language model programs with typed signatures."
site_author: jpablo
site_url: https://jpablo.github.io/dspy4s/

repo_url: https://github.com/jpablo/dspy4s
repo_name: jpablo/dspy4s
edit_uri: edit/main/site/docs/

# Build output goes into the repo's already-gitignored target/ dir.
docs_dir: docs
site_dir: ../target/site

theme:
  name: material
  icon:
    repo: fontawesome/brands/github
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: deep purple
      accent: deep purple
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: deep purple
      accent: deep purple
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  features:
    - navigation.tracking
    - navigation.sections
    - navigation.top
    - navigation.indexes
    - content.code.copy
    - content.code.annotate
    - content.tabs.link
    - search.suggest
    - search.highlight
    - toc.follow
  font:
    text: Inter
    code: JetBrains Mono

extra_css:
  - stylesheets/extra.css

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - def_list
  - toc:
      permalink: true
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.superfences
  - pymdownx.details
  - pymdownx.tabbed:
      alternate_style: true
  # Material icon / emoji shortcodes (:material-shield-check:) → inline SVG.
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  # The heart of the compiler-verified-snippet pipeline: pull labeled regions
  # straight out of the strict-compiled examples module, never copy-paste.
  #   --8<-- "learn/programming/Signatures.scala:toxicity"
  # check_paths makes the build FAIL if a file or region is renamed/removed,
  # so docs can't silently drift from the code.
  - pymdownx.snippets:
      base_path:
        - ..
        - ../modules/examples/src/main/scala/dspy4s/examples
      check_paths: true
      dedent_subsections: true

# The nav follows the library's dependency layering, presented in learning order.
# It grows as pages land; sections appear once their pages exist (mkdocs --strict
# rejects nav entries pointing at missing files).
nav:
  - Home: index.md
  - Get Started:
      - Installation: get-started/installation.md
      - Quickstart: get-started/quickstart.md
      - How it fits together: get-started/overview.md
  - Programs:
      - Signatures: programs/signatures.md
      - Modules: programs/modules.md
      - Tools & ReAct: programs/tools-and-react.md
      - Composing programs: programs/composing.md
  - Language models:
      - Configuring an LM: language-models/configuring.md
      - Adapters: language-models/adapters.md
      - Caching & usage: language-models/caching-and-usage.md
  - Evaluation:
      - Examples & data: evaluation/examples-and-data.md
      - Metrics: evaluation/metrics.md
      - Running evaluations: evaluation/running-evaluations.md
  - Optimization:
      - optimization/index.md
      - Few-shot demonstrations: optimization/few-shot.md
      - Instruction optimization: optimization/instructions.md
  - Runtime:
      - Runtime context: runtime/runtime-context.md
      - Observability: runtime/observability.md
      - Saving & loading: runtime/saving-and-loading.md
      - Streaming: runtime/streaming.md
  - Coming from DSPy: coming-from-dspy.md
  - Reference:
      - Cheatsheet: reference/cheatsheet.md
      - API: reference/api.md
