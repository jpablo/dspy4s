services:
  dev-gateway:
    build:
      context: .
      dockerfile: Dockerfile
    image: dev-gateway:latest
    container_name: dev-gateway
    hostname: dev-host
    restart: unless-stopped
    ports:
      # Host 2222 -> container 22. Bind to 0.0.0.0 so other LAN machines can reach it.
      - "2222:22"
    volumes:
      # Host project roots mounted under the dev user's home. Add more lines here
      # to expose additional projects — keep the convention `${HOME}/X:/home/dev/X`
      # so paths stay predictable across host and container.
      - ${HOME}/GitHub:/home/dev/GitHub
      - ../:/home/dev/dspy4s
      # SSH public keys (read-only); copied into ~/.ssh by entrypoint with correct perms.
      - ${HOME}/.ssh/authorized_keys:/keys/authorized_keys:ro
      # Persist caches / IDE backend across container rebuilds.
      - gateway_home_cache:/home/dev/.cache
      - gateway_sbt:/home/dev/.sbt
      - gateway_ivy2:/home/dev/.ivy2
      - gateway_coursier:/home/dev/.local/share/coursier
      - gateway_ssh_host_keys:/etc/ssh/keys
    working_dir: /home/dev

volumes:
  gateway_home_cache:
  gateway_sbt:
  gateway_ivy2:
  gateway_coursier:
  gateway_ssh_host_keys:
