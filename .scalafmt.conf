version = "3.8.3"
runner.dialect = scala3

maxColumn = 120
indent.main = 2

# Scala 3 significant-indentation codebase: keep the brace-less syntax as written,
# don't rewrite control syntax or strip/add optional braces.
rewrite.scala3.convertToNewSyntax = false
rewrite.scala3.removeOptionalBraces = false

align.preset = more
align.multiline = false

danglingParentheses.preset = true
newlines.source = keep

# scalameta (scalafmt's parser) mis-lexes a triple-quoted literal (`"""hi"}"""`) that the Scala 3 compiler accepts;
# exclude the file rather than alter the test's intent.
project.excludePaths = ["glob:**/JsonStreamingStateSuite.scala"]

